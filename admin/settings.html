<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings – PlayBox Kashmir Admin</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.pk-settings-section{margin-bottom:1rem;}
.pk-settings-section h4{font-size:0.85rem;font-weight:700;color:#374151;margin-bottom:1rem;}
.pk-save-bar{display:flex;align-items:center;gap:1rem;margin-top:1rem;}
.pk-save-msg{font-size:0.85rem;color:#10b981;font-weight:600;display:none;}
</style>
</head>
<body class="admin-body">

<aside class="admin-sidebar" id="adminSidebar">
<div class="sidebar-brand">
<span class="logo-play">Play</span><span class="logo-box">Box</span>
<span style="color:#f59e0b;font-size:0.75rem;font-weight:700;margin-left:4px;">ADMIN</span>
</div>
<nav class="sidebar-nav">
<a href="dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
<a href="bookings.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Bookings</a>
<a href="calendar.html" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Calendar View</a>
<a href="customers.html" class="sidebar-link"><i class="fas fa-users"></i> Customers</a>
<a href="facilities.html" class="sidebar-link"><i class="fas fa-building"></i> Facilities</a>
<a href="pricing.html" class="sidebar-link"><i class="fas fa-tags"></i> Pricing</a>
<a href="promos.html" class="sidebar-link"><i class="fas fa-percentage"></i> Promo Codes</a>
<a href="reports.html" class="sidebar-link"><i class="fas fa-chart-bar"></i> Reports</a>
<a href="settings.html" class="sidebar-link active"><i class="fas fa-cog"></i> Settings</a>
<div class="sidebar-divider"></div>
<a href="../index.html" class="sidebar-link" target="_blank"><i class="fas fa-external-link-alt"></i> View Website</a>
<a href="login.html" class="sidebar-link logout" onclick="handleLogout(event)"><i class="fas fa-sign-out-alt"></i> Logout</a>
</nav>
</aside>

<main class="admin-main">
<header class="admin-header">
<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="header-title">
<h1>Settings</h1>
<p>Configure business information and booking rules</p>
</div>
<div class="header-actions">
<div class="header-date" id="headerDate"></div>
</div>
</header>

<div style="padding:2rem;max-width:760px;">

<div class="admin-card">
<div class="pk-settings-section">
<h4>Business Information</h4>
<div class="form-grid">
<div class="form-group">
<label>Business Name</label>
<input type="text" id="setBusinessName" placeholder="PlayBox Kashmir">
</div>
<div class="form-group">
<label>Contact Phone</label>
<input type="tel" id="setBusinessPhone" placeholder="+91 XXXXX XXXXX">
</div>
<div class="form-group form-full">
<label>Contact Email</label>
<input type="email" id="setBusinessEmail" placeholder="contact@playboxkashmir.com">
</div>
<div class="form-group form-full">
<label>Address</label>
<input type="text" id="setBusinessAddress" placeholder="Business address">
</div>
</div>
</div>

<div class="pk-settings-section">
<h4>Booking Rules</h4>
<div class="form-grid">
<div class="form-group">
<label>Opening Hour (24h, e.g. 9)</label>
<input type="number" id="setOpeningHour" min="0" max="23" placeholder="9">
</div>
<div class="form-group">
<label>Closing Hour (24h, e.g. 26 for 2 AM)</label>
<input type="number" id="setClosingHour" min="0" max="30" placeholder="26">
</div>
<div class="form-group">
<label>Slot Duration (minutes)</label>
<input type="number" id="setSlotDuration" min="15" step="15" placeholder="60">
</div>
</div>
</div>

<div class="pk-save-bar">
<button class="btn-add-booking" id="saveSettingsBtn" onclick="saveSettings()"><i class="fas fa-save"></i> Save Settings</button>
<span class="pk-save-msg" id="saveSettingsMsg">Settings saved successfully.</span>
</div>
</div>

</div>
</main>

<script src="admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
loadSettings();
});

const SETTINGS_FIELDS = [
{ key: 'business_name', id: 'setBusinessName' },
{ key: 'business_phone', id: 'setBusinessPhone' },
{ key: 'business_email', id: 'setBusinessEmail' },
{ key: 'business_address', id: 'setBusinessAddress' },
{ key: 'opening_hour', id: 'setOpeningHour' },
{ key: 'closing_hour', id: 'setClosingHour' },
{ key: 'slot_duration_minutes', id: 'setSlotDuration' }
];

async function loadSettings() {
try {
const res = await fetch('/api/settings', { credentials: 'include' });
if (!res.ok) return;
const data = await res.json();
const settings = data.settings || {};
SETTINGS_FIELDS.forEach(f => {
if (settings[f.key] !== undefined && settings[f.key] !== null) {
document.getElementById(f.id).value = settings[f.key];
}
});
} catch (err) {
console.error('Failed to load settings', err);
}
}

async function saveSettings() {
const btn = document.getElementById('saveSettingsBtn');
const msg = document.getElementById('saveSettingsMsg');
btn.disabled = true;
msg.style.display = 'none';

try {
for (const f of SETTINGS_FIELDS) {
const value = document.getElementById(f.id).value;
await fetch('/api/settings', {
method: 'PUT',
headers: { 'Content-Type': 'application/json' },
credentials: 'include',
body: JSON.stringify({ key: f.key, value: value })
});
}
msg.style.display = 'inline';
setTimeout(() => { msg.style.display = 'none'; }, 3000);
} catch (err) {
alert('Some settings may not have saved due to a network error. Please try again.');
} finally {
btn.disabled = false;
}
}
</script>
</body>
</html>
