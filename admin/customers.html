<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers – PlayBox Kashmir Admin</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.pk-toolbar{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.pk-search{flex:1;min-width:220px;position:relative;}
.pk-search i{position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:0.85rem;}
.pk-search input{width:100%;padding:0.65rem 0.9rem 0.65rem 2.4rem;border:1px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:0.875rem;color:#111827;background:#fff;box-sizing:border-box;}
.pk-search input:focus{outline:none;border-color:#1a56db;}
.pk-empty,.pk-loading{text-align:center;color:#9ca3af;padding:2rem;}
</style>
</head>
<body class="admin-body">

<aside class="admin-sidebar" id="adminSidebar">
<div class="sidebar-brand">
<span class="logo-play">Play</span><span class="logo-box">Box</span>
<span style="color:#f59e0b;font-size:0.75rem;font-weight:700;margin-left:4px;">ADMIN</span>
</div>
<nav class="sidebar-nav">
<a href="dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
<a href="bookings.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Bookings</a>
<a href="calendar.html" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Calendar View</a>
<a href="customers.html" class="sidebar-link active"><i class="fas fa-users"></i> Customers</a>
<a href="facilities.html" class="sidebar-link"><i class="fas fa-building"></i> Facilities</a>
<a href="pricing.html" class="sidebar-link"><i class="fas fa-tags"></i> Pricing</a>
<a href="promos.html" class="sidebar-link"><i class="fas fa-percentage"></i> Promo Codes</a>
<a href="reports.html" class="sidebar-link"><i class="fas fa-chart-bar"></i> Reports</a>
<a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a>
<div class="sidebar-divider"></div>
<a href="../index.html" class="sidebar-link" target="_blank"><i class="fas fa-external-link-alt"></i> View Website</a>
<a href="login.html" class="sidebar-link logout" onclick="handleLogout(event)"><i class="fas fa-sign-out-alt"></i> Logout</a>
</nav>
</aside>

<main class="admin-main">
<header class="admin-header">
<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="header-title">
<h1>Customers</h1>
<p>View customer booking history and contact details</p>
</div>
<div class="header-actions">
<div class="header-date" id="headerDate"></div>
</div>
</header>

<div style="padding:2rem;">
<div class="admin-card">
<div class="pk-toolbar">
<div class="pk-search">
<i class="fas fa-search"></i>
<input type="text" id="customerSearch" placeholder="Search by name, email or phone...">
</div>
</div>
<div class="bookings-table-wrap">
<table class="bookings-table">
<thead>
<tr>
<th>Customer</th>
<th>Email</th>
<th>Phone</th>
<th>Total Bookings</th>
<th>Total Spent</th>
<th>Last Booking</th>
</tr>
</thead>
<tbody id="customersTable">
<tr><td colspan="6" class="pk-loading">Loading customers...</td></tr>
</tbody>
</table>
</div>
</div>
</div>
</main>

<script src="admin.js"></script>
<script>
let customerSearchTimer = null;

document.addEventListener('DOMContentLoaded', () => {
loadCustomers();
const input = document.getElementById('customerSearch');
input.addEventListener('input', () => {
clearTimeout(customerSearchTimer);
customerSearchTimer = setTimeout(() => loadCustomers(input.value.trim()), 350);
});
});

async function loadCustomers(search) {
const tbody = document.getElementById('customersTable');
tbody.innerHTML = '<tr><td colspan="6" class="pk-loading">Loading customers...</td></tr>';
try {
const url = '/api/customers' + (search ? ('?search=' + encodeURIComponent(search)) : '');
const res = await fetch(url, { credentials: 'include' });
if (!res.ok) { tbody.innerHTML = '<tr><td colspan="6" class="pk-empty">Failed to load customers.</td></tr>'; return; }
const data = await res.json();
const customers = data.customers || [];
if (!customers.length) {
tbody.innerHTML = '<tr><td colspan="6" class="pk-empty">No customers found.</td></tr>';
return;
}
tbody.innerHTML = customers.map(renderCustomerRow).join('');
} catch (err) {
tbody.innerHTML = '<tr><td colspan="6" class="pk-empty">Failed to load customers.</td></tr>';
}
}

function renderCustomerRow(c) {
const initial = (c.customer_name || '?').charAt(0).toUpperCase();
const spent = Number(c.total_spent) || 0;
const lastDate = c.last_booking_date ? new Date(c.last_booking_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
return '<tr>' +
'<td><div class="customer-cell"><div class="customer-avatar">' + initial + '</div><div class="customer-name">' + escapeHtml(c.customer_name || '—') + '</div></div></td>' +
'<td>' + escapeHtml(c.customer_email || '—') + '</td>' +
'<td>' + escapeHtml(c.customer_phone || '—') + '</td>' +
'<td>' + c.total_bookings + '</td>' +
'<td class="amount">' + formatCurrency(spent) + '</td>' +
'<td>' + lastDate + '</td>' +
'</tr>';
}
</script>
</body>
</html>
