<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Codes – PlayBox Kashmir Admin</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.pk-empty,.pk-loading{text-align:center;color:#9ca3af;padding:2rem;}
</style>
</head>
<body class="admin-body">

<aside class="admin-sidebar" id="adminSidebar">
<div class="sidebar-brand">
<span class="logo-play">Play</span><span class="logo-box">Box</span>
<span style="color:#f59e0b;font-size:0.75rem;font-weight:700;margin-left:4px;">ADMIN</span>
</div>
<nav class="sidebar-nav">
<a href="dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
<a href="bookings.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Bookings</a>
<a href="calendar.html" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Calendar View</a>
<a href="customers.html" class="sidebar-link"><i class="fas fa-users"></i> Customers</a>
<a href="facilities.html" class="sidebar-link"><i class="fas fa-building"></i> Facilities</a>
<a href="pricing.html" class="sidebar-link"><i class="fas fa-tags"></i> Pricing</a>
<a href="promos.html" class="sidebar-link active"><i class="fas fa-percentage"></i> Promo Codes</a>
<a href="reports.html" class="sidebar-link"><i class="fas fa-chart-bar"></i> Reports</a>
<a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a>
<div class="sidebar-divider"></div>
<a href="../index.html" class="sidebar-link" target="_blank"><i class="fas fa-external-link-alt"></i> View Website</a>
<a href="login.html" class="sidebar-link logout" onclick="handleLogout(event)"><i class="fas fa-sign-out-alt"></i> Logout</a>
</nav>
</aside>

<main class="admin-main">
<header class="admin-header">
<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="header-title">
<h1>Promo Codes</h1>
<p>Create and manage discount codes for your customers</p>
</div>
<div class="header-actions">
<div class="header-date" id="headerDate"></div>
<button class="btn-add-booking" onclick="showAddPromoModal()"><i class="fas fa-plus"></i> Add Promo Code</button>
</div>
</header>

<div style="padding:2rem;">
<div class="admin-card">
<div class="bookings-table-wrap">
<table class="bookings-table">
<thead>
<tr>
<th>Code</th>
<th>Type</th>
<th>Value</th>
<th>Min Amount</th>
<th>Status</th>
<th>Created</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="promosTable">
<tr><td colspan="7" class="pk-loading">Loading promo codes...</td></tr>
</tbody>
</table>
</div>
</div>
</div>
</main>

<!-- Add/Edit Promo Modal -->
<div class="modal-overlay" id="promoModal" style="display:none;">
<div class="admin-modal">
<div class="modal-header">
<h3 id="promoModalTitle">Add Promo Code</h3>
<button class="modal-close-btn" onclick="closePromoModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<div class="form-grid">
<div class="form-group">
<label>Code</label>
<input type="text" id="promoCode" placeholder="e.g. SUMMER20" style="text-transform:uppercase;">
</div>
<div class="form-group">
<label>Type</label>
<select id="promoType">
<option value="percent">Percent (%)</option>
<option value="flat">Flat (Rs.)</option>
</select>
</div>
<div class="form-group">
<label>Value</label>
<input type="number" id="promoValue" min="0" step="1" placeholder="e.g. 20">
</div>
<div class="form-group">
<label>Minimum Amount (Rs.)</label>
<input type="number" id="promoMinAmount" min="0" step="1" placeholder="0">
</div>
</div>
<div id="promoError" style="display:none;color:#ef4444;font-size:0.85rem;padding:0 1.5rem 0.75rem;"></div>
</div>
<div class="modal-footer">
<button class="btn-cancel" onclick="closePromoModal()">Cancel</button>
<button class="btn-confirm" id="savePromoBtn" onclick="submitPromo()">Save Promo Code</button>
</div>
</div>
</div>

<script src="admin.js"></script>
<script>
let editingPromoId = null;
let allPromos = [];

document.addEventListener('DOMContentLoaded', () => {
loadPromos();
});

async function loadPromos() {
const tbody = document.getElementById('promosTable');
tbody.innerHTML = '<tr><td colspan="7" class="pk-loading">Loading promo codes...</td></tr>';
try {
const res = await fetch('/api/promos', { credentials: 'include' });
if (!res.ok) { tbody.innerHTML = '<tr><td colspan="7" class="pk-empty">Failed to load promo codes.</td></tr>'; return; }
const data = await res.json();
allPromos = data.promos || [];
if (!allPromos.length) {
tbody.innerHTML = '<tr><td colspan="7" class="pk-empty">No promo codes yet. Click "Add Promo Code" to create one.</td></tr>';
return;
}
tbody.innerHTML = allPromos.map(renderPromoRow).join('');
} catch (err) {
tbody.innerHTML = '<tr><td colspan="7" class="pk-empty">Failed to load promo codes.</td></tr>';
}
}

function renderPromoRow(p) {
const active = p.is_active !== false;
const statusClass = active ? 'confirmed' : 'cancelled';
const statusLabel = active ? 'Active' : 'Inactive';
const valueLabel = p.type === 'percent' ? (p.value + '%') : formatCurrency(p.value);
const created = p.created_at ? new Date(p.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
return '<tr>' +
'<td><code>' + escapeHtml(p.code) + '</code></td>' +
'<td>' + capitalize(p.type) + '</td>' +
'<td>' + valueLabel + '</td>' +
'<td class="amount">' + formatCurrency(p.min_amount || 0) + '</td>' +
'<td><span class="status-badge ' + statusClass + '">' + statusLabel + '</span></td>' +
'<td>' + created + '</td>' +
'<td>' +
'<button class="btn-icon" title="Edit" onclick="openEditPromo(' + p.id + ')"><i class="fas fa-edit"></i></button>' +
'<button class="btn-icon' + (active ? ' danger' : '') + '" title="' + (active ? 'Deactivate' : 'Activate') + '" onclick="togglePromoActive(' + p.id + ', ' + active + ')"><i class="fas fa-' + (active ? 'ban' : 'check') + '"></i></button>' +
'<button class="btn-icon danger" title="Delete" onclick="deletePromo(' + p.id + ')"><i class="fas fa-trash"></i></button>' +
'</td>' +
'</tr>';
}

function showAddPromoModal() {
editingPromoId = null;
document.getElementById('promoModalTitle').textContent = 'Add Promo Code';
document.getElementById('promoCode').value = '';
document.getElementById('promoCode').disabled = false;
document.getElementById('promoType').value = 'percent';
document.getElementById('promoValue').value = '';
document.getElementById('promoMinAmount').value = '';
hidePromoError();
document.getElementById('promoModal').style.display = 'flex';
}

function openEditPromo(id) {
const p = allPromos.find(x => x.id === id);
if (!p) return;
editingPromoId = id;
document.getElementById('promoModalTitle').textContent = 'Edit Promo Code';
document.getElementById('promoCode').value = p.code;
document.getElementById('promoCode').disabled = true;
document.getElementById('promoType').value = p.type;
document.getElementById('promoValue').value = p.value;
document.getElementById('promoMinAmount').value = p.min_amount || 0;
hidePromoError();
document.getElementById('promoModal').style.display = 'flex';
}

function closePromoModal() {
document.getElementById('promoModal').style.display = 'none';
}

function showPromoError(msg) {
const el = document.getElementById('promoError');
el.textContent = msg;
el.style.display = 'block';
}

function hidePromoError() {
const el = document.getElementById('promoError');
el.style.display = 'none';
el.textContent = '';
}

async function submitPromo() {
const btn = document.getElementById('savePromoBtn');
const code = document.getElementById('promoCode').value.trim();
const type = document.getElementById('promoType').value;
const value = document.getElementById('promoValue').value;
const minAmount = document.getElementById('promoMinAmount').value || 0;

if ((!editingPromoId && !code) || value === '') {
showPromoError('Code and value are required.');
return;
}

btn.disabled = true;
btn.textContent = 'Saving...';

try {
if (editingPromoId) {
const res = await fetch('/api/promos/' + editingPromoId, {
method: 'PATCH',
headers: { 'Content-Type': 'application/json' },
credentials: 'include',
body: JSON.stringify({ type: type, value: Number(value), min_amount: Number(minAmount) })
});
const data = await res.json();
if (!res.ok) { showPromoError(data.error || 'Could not update promo code.'); return; }
} else {
const res = await fetch('/api/promos', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
credentials: 'include',
body: JSON.stringify({ code: code, type: type, value: Number(value), min_amount: Number(minAmount) })
});
const data = await res.json();
if (!res.ok) { showPromoError(data.error || 'Could not create promo code.'); return; }
}
closePromoModal();
await loadPromos();
} catch (err) {
showPromoError('Network error. Please try again.');
} finally {
btn.disabled = false;
btn.textContent = 'Save Promo Code';
}
}

async function togglePromoActive(id, currentlyActive) {
try {
const res = await fetch('/api/promos/' + id, {
method: 'PATCH',
headers: { 'Content-Type': 'application/json' },
credentials: 'include',
body: JSON.stringify({ is_active: !currentlyActive })
});
if (!res.ok) { alert('Could not update promo status.'); return; }
await loadPromos();
} catch (err) {
alert('Network error. Please try again.');
}
}

async function deletePromo(id) {
if (!confirm('Delete this promo code? This cannot be undone.')) return;
try {
const res = await fetch('/api/promos/' + id, { method: 'DELETE', credentials: 'include' });
if (!res.ok) { alert('Could not delete promo code.'); return; }
await loadPromos();
} catch (err) {
alert('Network error. Please try again.');
}
}
</script>
</body>
</html>
