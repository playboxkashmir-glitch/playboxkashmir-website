<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – PlayBox Kashmir</title>
<link rel="stylesheet" href="admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="login-page">
<div class="login-card">
<div class="login-logo">
<span class="play">Play</span><span class="box">Box</span>
</div>
<h2>Admin Panel Login</h2>
<form class="login-form" onsubmit="handleLogin(event)">
<div class="form-group">
<label>Username</label>
<input type="text" id="loginUser" placeholder="admin" required>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="loginPass" placeholder="********" required>
</div>
<div id="loginError" style="color:#ef4444;font-size:0.85rem;margin-bottom:1rem;display:none;"></div>
<button type="submit" class="btn-login" id="loginSubmitBtn">Login to Dashboard</button>
</form>
<p style="margin-top:1.5rem;font-size:0.8rem;color:#9ca3af;">
<a href="../index.html" style="color:#1a56db;text-decoration:none;">Back to Website</a>
</p>
</div>
<script>
async function handleLogin(e) {
e.preventDefault();
const user = document.getElementById('loginUser').value;
const pass = document.getElementById('loginPass').value;
const errorEl = document.getElementById('loginError');
const btn = document.getElementById('loginSubmitBtn');
errorEl.style.display = 'none';
btn.disabled = true;
btn.textContent = 'Signing in...';
try {
const res = await fetch('/api/auth/login', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
credentials: 'include',
body: JSON.stringify({ username: user, password: pass })
});
const data = await res.json();
if (!res.ok) {
errorEl.textContent = data.error || 'Login failed. Please try again.';
errorEl.style.display = 'block';
btn.disabled = false;
btn.textContent = 'Login to Dashboard';
return;
}
window.location.href = 'dashboard.html';
} catch (err) {
errorEl.textContent = 'Could not reach the server. Please try again.';
errorEl.style.display = 'block';
btn.disabled = false;
btn.textContent = 'Login to Dashboard';
}
}
(async () => {
try {
const res = await fetch('/api/auth/session', { credentials: 'include' });
if (res.ok) window.location.href = 'dashboard.html';
} catch (err) {}
})();
</script>
</body>
</html>
